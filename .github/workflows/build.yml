name: .NET Build & Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:  # enable manual runs
  workflow_call:   # allows other workflows to call this one  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    - name: Restore dependencies
      run: dotnet restore YahooQuotesObservable.slnx

    - name: Build solution
      run: dotnet build YahooQuotesObservable.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test YahooQuotesObservable.Tests/YahooQuotesObservable.Tests.csproj --configuration Release --no-build --verbosity normal
